version: 2

models:
  - name: int_expenses__by_channel_month
    description: >
      One row per sales channel per calendar month. Joins advertising spend and
      salary/commission costs into a single unified cost table with channel attribution.

      Modeling decision: advertising spend is attributed exclusively to inbound.
      All paid advertising (Facebook, Google) drives inbound form submissions —
      outbound BDR activity generates no ad spend, only headcount cost.
      This is not an assumption; it follows directly from the business model.
      Salary costs are already split by channel in the source and require no allocation.

      This model is the authoritative CAC cost denominator. total_cost_usd is the
      correct per-channel per-month cost basis for CAC calculation in mart_cac_ltv.

      Trade-offs documented:
        - Advertising cannot be split within inbound (e.g. Facebook vs Google) —
          source provides monthly aggregate only. Noted as a data gap.
        - 6 months of data (Jan–Jun 2024) limits trend analysis. Conclusions
          should be treated as directional rather than statistically definitive.
    config:
      materialized: ephemeral
    columns:
      - name: expense_channel_month_sk
        description: "{{ doc('surrogate_key') }} Natural key: month_date + channel."
        data_type: varchar
      - name: month_date
        description: First day of the calendar month. Parsed from Mon-YY source format.
        data_type: date
      - name: channel
        description: "{{ doc('sales_channel') }}"
        data_type: varchar
      - name: salary_and_commissions_usd
        description: >
          Total salary and commission cost for this channel and month.
          Source: stg_gtm__expenses_salary_and_commissions.
        data_type: numeric
      - name: advertising_spend_usd
        description: >
          Paid advertising spend attributed to this channel and month.
          Non-zero for inbound only — outbound has no ad spend and receives 0.
          Source: stg_gtm__expenses_advertising.
        data_type: numeric
      - name: total_cost_usd
        description: >
          Total channel cost for the month. Sum of salary_and_commissions_usd
          and advertising_spend_usd. Use as CAC denominator in mart_cac_ltv.
        data_type: numeric

  - name: int_leads__enriched
    description: >
      One row per lead, enriched with opportunity data and derived engagement metrics.
      Left joins stg_gtm__leads to stg_gtm__opportunities via converted_opportunity_id —
      90% of leads have no opportunity and will have null opportunity fields.

      Channel is derived from form_submission_date: inbound leads submitted a form via
      paid advertising; outbound leads were BDR-sourced cold contacts.

      Introduces two key derived metrics: speed_to_first_contact_hours (inbound only)
      and days_in_funnel (channel-aware start point). These are the primary leading
      indicator inputs for mart_leading_indicators.
    config:
      materialized: ephemeral
    columns:
      - name: lead_sk
        description: "{{ doc('surrogate_key') }} Natural key: lead_id."
        data_type: varchar
      - name: lead_id
        description: Salesforce lead identifier. Source primary key from stg_gtm__leads.
        data_type: varchar
      - name: converted_opportunity_id
        description: Foreign key to opportunities. Null for unconverted leads (90%).
        data_type: varchar
      - name: opportunity_sk
        description: Surrogate key from stg_gtm__opportunities. Null for unconverted leads.
        data_type: varchar
      - name: account_id
        description: Salesforce account identifier. Null for unconverted leads.
        data_type: varchar
      - name: channel
        description: "{{ doc('channel_derived') }}"
        data_type: varchar
      - name: stage_name
        description: Current opportunity funnel stage. Null for unconverted leads.
        data_type: varchar
      - name: is_won
        description: True if opportunity stage is Closed Won. Null for unconverted leads.
        data_type: boolean
      - name: is_lost
        description: True if opportunity stage is Closed Lost. Null for unconverted leads.
        data_type: boolean
      - name: is_open
        description: True if opportunity is in an active non-closed stage. Null for unconverted leads.
        data_type: boolean
      - name: attribution_source
        description: How the prospect heard about Owner. From opportunities. 76% null overall.
        data_type: varchar
      - name: lost_reason
        description: Categorized loss reason. Null for non-lost opportunities.
        data_type: varchar
      - name: demo_held
        description: Whether a demo was conducted. Null for unconverted leads.
        data_type: boolean
      - name: demo_set_date
        description: Date demo was scheduled. Null for unconverted leads.
        data_type: date
      - name: close_date
        description: Opportunity close date. Null for unconverted leads.
        data_type: date
      - name: status
        description: Lead lifecycle status from stg_gtm__leads.
        data_type: varchar
      - name: is_converted
        description: True if lead status is Converted.
        data_type: boolean
      - name: is_disqualified
        description: True if lead is in a terminal non-converting status.
        data_type: boolean
      - name: sales_call_count
        description: Total calls made to this lead.
        data_type: integer
      - name: sales_text_count
        description: Total texts sent to this lead.
        data_type: integer
      - name: sales_email_count
        description: Total emails sent to this lead.
        data_type: integer
      - name: total_activity_count
        description: Sum of calls, texts, and emails.
        data_type: integer
      - name: connected_with_decision_maker
        description: Whether SDR reached a decision maker.
        data_type: boolean
      - name: location_count
        description: Number of restaurant locations.
        data_type: integer
      - name: predicted_monthly_gmv_usd
        description: Estimated monthly GMV if restaurant adopts Owner. LTV proxy.
        data_type: numeric
      - name: marketplaces_used_cleaned
        description: Cleaned comma-separated third-party delivery platforms.
        data_type: varchar
      - name: olo_tools_cleaned
        description: Cleaned comma-separated first-party online ordering tools.
        data_type: varchar
      - name: cuisine_types_cleaned
        description: Cleaned comma-separated cuisine categories.
        data_type: varchar
      - name: form_submission_date
        description: Inbound form submission date. Null for outbound leads.
        data_type: date
      - name: first_sales_call_at
        description: Timestamp of first sales call.
        data_type: timestamp
      - name: first_text_sent_at
        description: Timestamp of first text sent.
        data_type: timestamp
      - name: first_meeting_booked_at
        description: Timestamp of first meeting booked.
        data_type: timestamp
      - name: last_sales_call_at
        description: Timestamp of most recent call from leads.
        data_type: timestamp
      - name: last_sales_activity_at
        description: Timestamp of most recent activity across all channels.
        data_type: timestamp
      - name: last_sales_email_at
        description: Timestamp of most recent email.
        data_type: timestamp
      - name: opportunity_created_at
        description: Timestamp opportunity was created in Salesforce.
        data_type: timestamp
      - name: demo_scheduled_at
        description: Scheduled demo timestamp.
        data_type: timestamp
      - name: opp_last_sales_call_at
        description: Most recent AE call timestamp from opportunities table.
        data_type: timestamp
      - name: speed_to_first_contact_hours
        description: "{{ doc('speed_to_first_contact_hours') }}"
        data_type: numeric
      - name: days_in_funnel
        description: "{{ doc('days_in_funnel') }}"
        data_type: numeric

  - name: int_funnel__conversion_rates
    description: >
      One row per sales channel per calendar month. Aggregates lead funnel progression
      from lead creation through closed won, with conversion rates at each stage.

      Lead month is channel-aware: inbound uses form_submission_date,
      outbound uses first_sales_call_at. This is a cohort view — leads are attributed
      to the month they entered the funnel, not the month they closed.

      All rates use dbt_utils.safe_divide to handle zero denominators in low-volume
      months (early history 2020–2022, sparse outbound pre-2024).

      Note: expense data covers Jan–Jun 2024 only. CAC calculations joining this
      model to int_expenses__by_channel_month are naturally scoped to that window.
      Jul 2024 data is partial and should be flagged in downstream consumers.
    config:
      materialized: ephemeral
    columns:
      - name: funnel_channel_month_sk
        description: "{{ doc('surrogate_key') }} Natural key: month_date + channel."
        data_type: varchar
      - name: month_date
        description: >
          First day of the calendar month. Channel-aware: inbound uses
          form_submission_date, outbound uses first_sales_call_at.
        data_type: date
      - name: channel
        description: "{{ doc('channel_derived') }}"
        data_type: varchar
      - name: leads_created
        description: Total leads entering the funnel this month for this channel.
        data_type: bigint
      - name: demos_set
        description: Leads that progressed to a scheduled demo (demo_set_date non-null).
        data_type: bigint
      - name: demos_held
        description: Leads where a demo was actually conducted (demo_held = true).
        data_type: bigint
      - name: closed_won
        description: Leads that converted to a closed won opportunity.
        data_type: bigint
      - name: closed_lost
        description: Leads that reached closed lost stage.
        data_type: bigint
      - name: lead_to_demo_set_rate
        description: Conversion rate from lead creation to demo scheduled. demos_set / leads_created.
        data_type: numeric
      - name: demo_set_to_held_rate
        description: Show rate — proportion of scheduled demos that were actually held. demos_held / demos_set.
        data_type: numeric
      - name: demo_to_close_rate
        description: Close rate from held demo to closed won. closed_won / demos_held.
        data_type: numeric
      - name: overall_conversion_rate
        description: End-to-end funnel conversion rate. closed_won / leads_created.
        data_type: numeric

  - name: int_restaurant__profile
    description: >
      One row per lead — restaurant prospect firmographic profile with derived LTV estimate.
      Grain is lead not account: account_id only appears on converted leads via opportunities,
      so using lead grain preserves the full prospect universe.

      Marketplace count and OLO tool flag are derived from cleaned array fields.
      estimated_annual_ltv_usd is a proxy based on Owner's pricing model
      ($500/mo subscription + 5% take rate on predicted GMV) — not observed revenue.
    config:
      materialized: ephemeral
    columns:
      - name: lead_sk
        description: "{{ doc('surrogate_key') }} Natural key: lead_sk from int_leads__enriched."
        data_type: varchar
      - name: lead_id
        description: Salesforce lead identifier.
        data_type: varchar
      - name: channel
        description: "{{ doc('channel_derived') }}"
        data_type: varchar
      - name: is_converted
        description: True if lead converted to an opportunity.
        data_type: boolean
      - name: is_won
        description: True if associated opportunity reached Closed Won. Null for unconverted leads.
        data_type: boolean
      - name: location_count
        description: Number of restaurant locations for this lead.
        data_type: integer
      - name: cuisine_types_cleaned
        description: Cleaned comma-separated cuisine categories.
        data_type: varchar
      - name: marketplace_count
        description: "{{ doc('marketplace_count') }}"
        data_type: integer
      - name: has_olo_tool
        description: "{{ doc('has_olo_tool') }}"
        data_type: boolean
      - name: predicted_monthly_gmv_usd
        description: "{{ doc('predicted_monthly_gmv_usd') }}"
        data_type: numeric
      - name: estimated_annual_ltv_usd
        description: "{{ doc('estimated_annual_ltv_usd') }}"
        data_type: numeric
