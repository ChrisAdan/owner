version: 2

# ──────────────────────────────────────────────────────────────────────────────
# Owner GTM Analytics — Semantic Layer Metrics
# ──────────────────────────────────────────────────────────────────────────────
# Format: dbt Semantic Layer / MetricFlow (dbt Core 1.6+)
# Adapter: Snowflake (production) / Postgres (dev)
#
# Semantic models define the grain, dimensions, and measures available to
# MetricFlow. Metrics reference those measures to define queryable KPIs.
#
# Usage examples (dbt Cloud or dbt-sl CLI):
#   mf query --metrics cac_usd --group-by channel,metric_time__month
#   mf query --metrics cac_ltv_ratio,outbound_conversion_rate --group-by metric_time__month
#   mf query --metrics hot_lead_count,warm_lead_count --group-by channel
#
# Agentic layer note (Claude Code / Cortex Analyst):
#   These definitions are the authoritative source of metric semantics.
#   An LLM query agent grounded in this file can answer GTM questions in plain
#   English without writing SQL — MetricFlow/Cortex handles compilation.
#   See semantic_model.yaml for the parallel Snowflake Cortex Analyst spec.
# ──────────────────────────────────────────────────────────────────────────────


# ── SEMANTIC MODELS ───────────────────────────────────────────────────────────

semantic_models:

  - name: gtm_channel_month
    description: >
      One row per channel per calendar month. Joins mart_cac_ltv (cost + CAC)
      with mart_gtm_funnel (funnel counts + rates) on the same channel + month_date
      grain. Primary semantic model for cohort-level GTM analysis.
    model: ref('mart_cac_ltv')
    defaults:
      agg_time_dimension: metric_time

    entities:
      - name: channel_month
        type: primary
        expr: cac_ltv_sk

    dimensions:
      - name: metric_time
        type: time
        type_params:
          time_granularity: month
        expr: month_date

      - name: channel
        type: categorical
        expr: channel
        description: >
          Sales channel. 'inbound' = SDR-driven paid ad traffic.
          'outbound' = BDR-driven cold outreach. Authoritative channel signal.

    measures:
      - name: total_cost_usd
        agg: sum
        expr: total_cost_usd
        description: Total GTM spend for the channel-month (salary + commissions + advertising).

      - name: new_customers_won
        agg: sum
        expr: new_customers_won
        description: Closed won opportunities cohort-attributed to this channel and month.

      - name: avg_estimated_ltv_usd
        agg: average
        expr: avg_estimated_ltv_usd
        description: >
          Average estimated annual LTV for won customers in this cohort month.
          Proxy: (predicted_monthly_gmv_usd * 0.05 * 12) + (500 * 12).
          Directional signal, not realized revenue.

      - name: cac_usd
        agg: average
        expr: cac_usd
        description: >
          Customer acquisition cost (total_cost_usd / new_customers_won).
          Null where new_customers_won = 0.

      - name: cac_ltv_ratio
        agg: average
        expr: cac_ltv_ratio
        description: >
          avg_estimated_ltv_usd / cac_usd. Values > 3 indicate healthy
          subscription unit economics. Values < 1 mean acquisition costs
          exceed estimated lifetime value.


  - name: gtm_funnel
    description: >
      One row per channel per calendar month. Full funnel history from 2020.
      Conversion rates and engagement timing per cohort. Use for funnel stage
      analysis and channel comparison.
    model: ref('mart_gtm_funnel')
    defaults:
      agg_time_dimension: metric_time

    entities:
      - name: funnel_channel_month
        type: primary
        expr: gtm_funnel_sk

    dimensions:
      - name: metric_time
        type: time
        type_params:
          time_granularity: month
        expr: month_date

      - name: channel
        type: categorical
        expr: channel

    measures:
      - name: leads_created
        agg: sum
        expr: leads_created

      - name: demos_set
        agg: sum
        expr: demos_set

      - name: demos_held
        agg: sum
        expr: demos_held

      - name: closed_won
        agg: sum
        expr: closed_won

      - name: closed_lost
        agg: sum
        expr: closed_lost

      - name: avg_lead_to_demo_set_rate
        agg: average
        expr: lead_to_demo_set_rate
        description: demos_set / leads_created. Top-of-funnel efficiency.

      - name: avg_overall_conversion_rate
        agg: average
        expr: overall_conversion_rate
        description: closed_won / leads_created. End-to-end funnel efficiency.

      - name: avg_speed_to_first_contact_hours
        agg: average
        expr: avg_speed_to_first_contact_hours
        description: >
          Average hours from inbound form submission to first sales call.
          Inbound only — null for outbound. Key leading indicator: sub-72h
          response associated with ~2x conversion lift.

      - name: avg_days_in_funnel
        agg: average
        expr: avg_days_in_funnel
        description: >
          Average days in funnel for converted leads. Channel-aware start point:
          inbound = form_submission_date, outbound = first_sales_call_at.


  - name: lead_universe
    description: >
      One row per lead. Full prospect universe with conversion tier scoring.
      Use for pipeline segmentation, SDR queue analysis, and lead-level
      attribute queries. Not a time-series model — no metric_time dimension.
    model: ref('mart_leading_indicators')

    entities:
      - name: lead
        type: primary
        expr: lead_sk

    dimensions:
      - name: channel
        type: categorical
        expr: channel

      - name: conversion_probability_tier
        type: categorical
        expr: conversion_probability_tier
        description: >
          hot: connected_with_decision_maker = true (24–41% observed conversion).
          warm: activity > 0 AND (speed ≤ 72h OR predicted GMV > $6,279/mo).
          converted: already a customer — upsell/expansion target.
          cold: all remaining active leads (~1–3% conversion).
          null: disqualified leads (excluded from scoring).

      - name: is_converted
        type: categorical
        expr: is_converted

      - name: is_disqualified
        type: categorical
        expr: is_disqualified

      - name: has_olo_tool
        type: categorical
        expr: has_olo_tool

    measures:
      - name: lead_count
        agg: count
        expr: lead_sk
        description: Total leads in scope.

      - name: converted_lead_count
        agg: sum
        expr: "case when is_converted = true then 1 else 0 end"
        description: Leads that converted to an opportunity.

      - name: avg_predicted_monthly_gmv_usd
        agg: average
        expr: predicted_monthly_gmv_usd
        description: >
          Average predicted monthly GMV across leads in scope.
          Proxy for prospect quality and LTV potential.

      - name: avg_activity_density_score
        agg: average
        expr: activity_density_score
        description: >
          Average engagement intensity (touches per day in funnel).
          Use to rank within cohorts, not as a standalone threshold.


# ── METRICS ───────────────────────────────────────────────────────────────────

metrics:

  # ── CAC / LTV ──────────────────────────────────────────────────────────────

  - name: cac_usd
    label: "Customer acquisition cost (USD)"
    description: >
      Average cost to acquire one new customer, by channel and month.
      total_cost_usd / new_customers_won within cohort month.
      Interpret late-window months (May–Jun 2024) with caution — leads may
      not have had time to close within the expense observation window.
    type: simple
    type_params:
      measure: cac_usd

  - name: cac_ltv_ratio
    label: "CAC:LTV ratio"
    description: >
      avg_estimated_ltv_usd / cac_usd. Benchmark: > 3x is healthy for
      subscription businesses. < 1x means acquisition cost exceeds LTV.
      Jun 2024 outbound = 1.6x — approaching viability floor.
    type: simple
    type_params:
      measure: cac_ltv_ratio

  - name: total_gtm_spend
    label: "Total GTM spend (USD)"
    description: Sum of salary, commissions, and advertising spend across scope.
    type: simple
    type_params:
      measure: total_cost_usd

  - name: new_customers_won
    label: "New customers won"
    description: Closed won opportunities, cohort-attributed to channel and month.
    type: simple
    type_params:
      measure: new_customers_won

  - name: avg_estimated_ltv
    label: "Average estimated LTV (USD)"
    description: >
      Average estimated annual LTV for won customers in cohort month.
      Proxy based on predicted GMV and Owner's 5% take rate + $500/mo subscription.
    type: simple
    type_params:
      measure: avg_estimated_ltv_usd


  # ── FUNNEL ─────────────────────────────────────────────────────────────────

  - name: leads_created
    label: "Leads created"
    description: Total leads entering the funnel, by channel and month.
    type: simple
    type_params:
      measure: leads_created

  - name: inbound_conversion_rate
    label: "Inbound conversion rate"
    description: >
      Overall closed_won / leads_created for the inbound channel.
      Fell from 0.90% (Jan 2024) to 0.37% (Jun 2024) for outbound.
    type: simple
    type_params:
      measure: avg_overall_conversion_rate

  - name: lead_to_demo_set_rate
    label: "Lead → demo set rate"
    description: >
      demos_set / leads_created. Top-of-funnel efficiency signal.
      Outbound rate fell from 5.3% (Jan) to 1.8% (Jun), concentrated
      at this stage — indicating list quality or contact rate issues,
      not AE close performance.
    type: simple
    type_params:
      measure: avg_lead_to_demo_set_rate

  - name: avg_speed_to_first_contact
    label: "Avg speed to first contact (hours)"
    description: >
      Average hours from inbound form submission to first sales call.
      Inbound only. Key leading indicator: sub-72h response associates
      with ~47% conversion vs ~20% after one week.
    type: simple
    type_params:
      measure: avg_speed_to_first_contact_hours

  - name: avg_days_in_funnel
    label: "Avg days in funnel (converted leads)"
    description: Average funnel duration for leads that converted. Channel-aware.
    type: simple
    type_params:
      measure: avg_days_in_funnel


  # ── LEAD SCORING / PIPELINE ────────────────────────────────────────────────

  - name: total_lead_count
    label: "Total leads"
    description: Total leads in the prospect universe.
    type: simple
    type_params:
      measure: lead_count

  - name: hot_lead_count
    label: "Hot leads"
    description: >
      Leads where connected_with_decision_maker = true.
      Observed conversion rate: 24–41%. Highest-priority SDR/BDR queue.
    type: where
    type_params:
      measure: lead_count
    filter: "{{ Dimension('lead__conversion_probability_tier') }} = 'hot'"

  - name: warm_lead_count
    label: "Warm leads"
    description: >
      Leads with activity > 0 AND (speed ≤ 72h OR predicted GMV > $6,279/mo).
      Observed conversion rate: ~5.2%.
    type: where
    type_params:
      measure: lead_count
    filter: "{{ Dimension('lead__conversion_probability_tier') }} = 'warm'"

  - name: cold_lead_count
    label: "Cold leads"
    description: All remaining active leads. Observed conversion rate: ~1.6%.
    type: where
    type_params:
      measure: lead_count
    filter: "{{ Dimension('lead__conversion_probability_tier') }} = 'cold'"

  - name: converted_customer_count
    label: "Converted customers (active)"
    description: >
      Leads already converted to opportunities — current customers.
      Upsell and expansion targeting pool.
    type: where
    type_params:
      measure: lead_count
    filter: "{{ Dimension('lead__conversion_probability_tier') }} = 'converted'"

  - name: avg_prospect_gmv
    label: "Avg prospect predicted GMV (USD/mo)"
    description: >
      Average predicted monthly GMV across leads in scope. Use to assess
      prospect quality and potential revenue mix of the pipeline.
    type: simple
    type_params:
      measure: avg_predicted_monthly_gmv_usd

  - name: pipeline_conversion_rate
    label: "Pipeline conversion rate"
    description: converted_lead_count / lead_count across the full prospect universe.
    type: ratio
    type_params:
      numerator: converted_lead_count
      denominator: lead_count