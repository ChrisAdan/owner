name: "owner"
version: "1.0.0"
profile: "owner"
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
clean-targets: ["target", "dbt_packages"]

vars:
  incremental_lookback_months: 2

seeds:
  owner:
    +quote_columns: false
    leads:
      +column_types:
        LEAD_ID: varchar
        SALES_CALL_COUNT: varchar
        SALES_TEXT_COUNT: varchar
        SALES_EMAIL_COUNT: varchar
        LOCATION_COUNT: varchar
        PREDICTED_SALES_WITH_OWNER: varchar
    +docs:
      node_color: "#8B6914" # warm brown — raw proxy data, distinct from sources

models:
  owner:
    staging:
      +materialized: view
      +docs:
        node_color: "#2E86AB" # steel blue — cleaned/typed, first trustworthy layer
    intermediate:
      +materialized: view
      +docs:
        node_color: "#A23B72" # plum — enriched/joined, middle tier
    marts:
      +materialized: table
      +docs:
        node_color: "#F18F01" # amber — business grain, consumption layer

on-run-end:
  - "{{ log('Run completed: ' ~ run_started_at, info=true) }}"
