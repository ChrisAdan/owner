name: Publish dbt Docs

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: _dbt

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DBT_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DBT_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DBT_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-core dbt-postgres
        working-directory: .

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          owner:
            target: docs
            outputs:
              docs:
                type: postgres
                host: localhost
                user: ${{ secrets.DBT_POSTGRES_USER }}
                password: ${{ secrets.DBT_POSTGRES_PASSWORD }}
                port: 5432
                dbname: ${{ secrets.DBT_POSTGRES_DB }}
                schema: gtm_case_docs
                threads: 4
          EOF
        working-directory: .

      - name: dbt deps
        run: dbt deps

      - name: dbt seed
        run: dbt seed

      - name: dbt build
        run: dbt build --full-refresh --exclude resource_type:seed

      - name: dbt docs generate
        run: dbt docs generate

      - name: Assemble GitHub Pages artifact
        run: |
          mkdir -p ../gh-pages
          cp target/index.html ../gh-pages/
          cp target/catalog.json ../gh-pages/
          cp target/manifest.json ../gh-pages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
          force_orphan: true
        working-directory: .
