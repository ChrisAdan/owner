name: Publish dbt Docs

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Install dbt packages
        working-directory: _dbt
        run: dbt deps

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          owner:
            target: docs
            outputs:
              docs:
                type: postgres
                host:localhost
                user: ${{ secrets.DBT_POSTGRES_USER }}
                password: ${{ secrets.DBT_POSTGRES_PASSWORD }}
                port: 5432
                dbname: ${{ secrets.DBT_POSTGRES_DB }}
                schema: gtm_case_docs
                threads: 4
          EOF

      - name: Seed source data
        working-directory: _dbt
        run: dbt seed

      - name: Build models
        working-directory: _dbt
        run: dbt build --full-refresh --exclude resource_type:seed

      - name: Generate docs
        working-directory: _dbt
        run: dbt docs generate

      - name: Assemble GitHub Pages artifact
        run: |
          mkdir -p gh-pages
          cp _dbt/target/index.html gh-pages/
          cp _dbt/target/catalog.json gh-pages/
          cp _dbt/target/manifest.json gh-pages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
          force_orphan: true
