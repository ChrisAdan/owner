name: dbt CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [dev, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-postgres dbt-core

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat << EOF > ~/.dbt/profiles.yml
          owner:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.DBT_POSTGRES_HOST }}
                user: ${{ secrets.DBT_POSTGRES_USER }}
                password: ${{ secrets.DBT_POSTGRES_PASSWORD }}
                port: 5432
                dbname: ${{ secrets.DBT_POSTGRES_DB }}
                schema: gtm_case_dev
                threads: 4
          EOF

      - name: dbt debug
        run: dbt debug

      - name: dbt deps
        run: dbt deps

      - name: dbt seed
        run: dbt seed

      - name: dbt run
        run: dbt run

      - name: dbt test
        run: dbt test
